<mat-toolbar color="primary" class="app-toolbar">
  <span class="app-title">Resume Builder 9000</span>
  <nav class="app-nav" aria-label="Main navigation">
    <a mat-button routerLink="/" routerLinkActive="active-link" #rlt="routerLinkActive"
       [routerLinkActiveOptions]="{exact: true}" aria-label="Home"
       [attr.aria-current]="rlt.isActive ? 'page' : null">
      <mat-icon>home</mat-icon> Home
    </a>
    <a mat-button routerLink="/applications" routerLinkActive="active-link" #rla="routerLinkActive"
       [routerLinkActiveOptions]="{exact: false}" aria-label="Applications"
       [attr.aria-current]="rla.isActive ? 'page' : null">
      <mat-icon>work</mat-icon> Applications
    </a>
    <a mat-button routerLink="/career-history" routerLinkActive="active-link" #rch="routerLinkActive"
       [routerLinkActiveOptions]="{exact: false}" aria-label="Career History"
       [attr.aria-current]="rch.isActive ? 'page' : null">
      <mat-icon>history</mat-icon> Career History
    </a>
    <a mat-button routerLink="/profile" routerLinkActive="active-link" #rpr="routerLinkActive"
       [routerLinkActiveOptions]="{exact: false}" aria-label="Profile"
       [attr.aria-current]="rpr.isActive ? 'page' : null">
      <mat-icon>person</mat-icon> Profile
    </a>
  </nav>
</mat-toolbar>

<main class="app-content">
  <router-outlet></router-outlet>
</main>
